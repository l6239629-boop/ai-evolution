const STAGE_IDS = ['stage-cover','stage-intro','stage-1','stage-2','stage-3','stage-4','stage-5','stage-6','stage-7','stage-8','stage-conclusion'];

function useActiveStage() {
  const [activeId, setActiveId] = useState('stage-cover');
  const handleScroll = useCallback(() => {
    const viewMiddle = window.innerHeight / 2;
    let closest = { id: activeId, dist: Infinity };
    for (const id of STAGE_IDS) {
      const el = document.getElementById(id);
      if (!el) continue;
      const rect = el.getBoundingClientRect();
      const dist = Math.abs(rect.top + rect.height / 2 - viewMiddle);
      if (dist < closest.dist) closest = { id, dist };
    }
    if (closest.id !== activeId) setActiveId(closest.id);
  }, [activeId]);
  useEffect(() => {
    window.addEventListener('scroll', handleScroll, { passive: true });
    handleScroll();
    return () => window.removeEventListener('scroll', handleScroll);
  }, [handleScroll]);
  const scrollToStage = useCallback((id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, []);
  return { activeId, scrollToStage, STAGE_IDS };
}

function useScrollProgress() {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const calc = () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      setProgress(docHeight > 0 ? scrollTop / docHeight : 0);
    };
    window.addEventListener('scroll', calc, { passive: true });
    calc();
    return () => window.removeEventListener('scroll', calc);
  }, []);
  return progress;
}

/* ========== STAGE 1: LM ========== */
const DEMO_TEXTS = ['人工智能正在改变','今天天气真不错','语言模型可以预测'];

function predictNext(text) {
  if (!text) return [];
  const last = text[text.length-1];
  const map = {'变':['得','革','化','成','为'],'预':['测','报','料','订','防'],'错':['误','过','失','觉','位'],'天':['气','空','地','堂','才']};
  const candidates = map[last] || ['的','了','是','一','不','人','在','有','我','他'];
  const total = candidates.length;
  return candidates.map((c,i) => ({char:c,prob:(total-i)/(total*(total+1)/2)}));
}

        <div style={{marginBottom:24}}>
          <label style={{display:'block',fontSize:13,color:'var(--text-muted)',marginBottom:8,fontFamily:'var(--font-mono)'}}>输入一段文字：</label>

        <div>

          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {predictions.map((p,i) => (
              <motion.div key={p.char} style={{display:'flex',alignItems:'center',gap:12}}

/* ========== STAGE 2: LLM + TOKENIZER ========== */
const SAMPLE_TEXTS = [{text:'我是一个人工智能助手',label:'中文示例'},{text:'Hello, how are you?',label:'英文示例'},{text:'What is the capital of China?',label:'问答示例'}];
const TOKEN_COLORS = ['#64ffda','#4fc3f7','#ffb74d','#f06292','#ba68c8','#4db6ac','#ff8a65','#aed581','#7986cb','#e57373','#81c784','#ffd54f','#4dd0e1','#b39ddb','#ffab91'];

function simpleTokenize(text) {
  if (/[\u4e00-\u9fff]/.test(text)) {
    const tokens=[];let i=0;
    while(i<text.length){const ch=text[i];
      if(/[\u4e00-\u9fff]/.test(ch)){if(i+1<text.length&&/[\u4e00-\u9fff]/.test(text[i+1])){tokens.push(text.slice(i,i+2));i+=2}else{tokens.push(ch);i++}}
      else if(/[a-zA-Z]/.test(ch)){let j=i;while(j<text.length&&/[a-zA-Z]/.test(text[j]))j++;tokens.push(text.slice(i,j));i=j}
      else if(ch===' '){tokens.push('␣');i++}else{if(ch==='?'||ch==='!'||ch==='.'||ch===','){tokens.push(ch);i++}else{tokens.push(ch);i++}}}
    return tokens;
  }
  return text.split(/(\s+|(?=[.,!?])|(?<=[.,!?]))/g).filter(Boolean).map(t=>t===' '?'␣':t);
}

function tokenize(text) {
  const tokens = [];
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (/[\u4e00-\u9fff]/.test(ch)) { tokens.push(text[i]); i++; }
    else if (/[a-zA-Z]/.test(ch)) { let j = i; while (j < text.length && /[a-zA-Z]/.test(text[j])) j++; tokens.push(text.slice(i, j)); i = j; }
    else if (/[0-9]/.test(ch)) { let j = i; while (j < text.length && /[0-9]/.test(text[j])) j++; tokens.push(text.slice(i, j)); i = j; }
    else if (ch === ' ') { tokens.push('␣'); i++; }
    else { tokens.push(text[i]); i++; }
  }
  return tokens;
}

function getTokenIds(tokens) {
  return tokens.map(t => { let h = 0; for (let i = 0; i < t.length; i++) { h = ((h << 5) - h) + t.charCodeAt(i); h |= 0; } return Math.abs(h % 90000) + 10000; });
}

          style={{marginTop:24,textAlign:'center',padding:'16px 24px',background:'rgba(100,255,218,0.06)',borderRadius:10,border:'1px solid var(--border-active)'}}>
          <p style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--accent-primary)',marginBottom:8}}>标准化结果输出</p>
          <div style={{display:'inline-block',fontFamily:'var(--font-mono)',fontSize:13,color:'var(--text-primary)',border:'1px solid var(--border-subtle)',borderRadius:8,overflow:'hidden'}}>
            <div style={{display:'flex'}}>{['日期','天气','温度'].map(h=><div key={h} style={{padding:'6px 14px',background:'rgba(100,255,218,0.08)',fontSize:12,fontWeight:600,color:'var(--accent-primary)',borderRight:'1px solid var(--border-subtle)'}}>{h}</div>)}</div>
            {[['5/21','☀️ 晴','24°C'],['5/22','⛅ 阴','20°C'],['5/23','🌧️ 小雨','18°C']].map((row,i)=>(<div key={i} style={{display:'flex',borderTop:'1px solid var(--border-subtle)'}}>{row.map((cell,j)=>(<div key={j} style={{padding:'6px 14px',fontSize:12,color:'var(--text-secondary)',borderRight:j<2?'1px solid var(--border-subtle)':'none'}}>{cell}</div>))}</div>))}
          </div>
        </motion.div>}</AnimatePresence>
        <div style={{display:'flex',justifyContent:'center',marginTop:24}}>
          <button onClick={runAll} style={{padding:'10px 28px',fontSize:14,fontFamily:'var(--font-sans)',fontWeight:600,background:'var(--accent-primary)',border:'none',borderRadius:8,color:'var(--bg-deep)',cursor:'pointer'}}>演示工作流编排</button>
        </div>
      </motion.div>
    </SectionWrapper>
  );
}

/* ========== STAGE 8: SKILL SYSTEM ========== */
const weatherData=[{date:'5/21',weather:'晴',temp:24,icon:'☀️'},{date:'5/22',weather:'阴',temp:20,icon:'⛅'},{date:'5/23',weather:'小雨',temp:18,icon:'🌧️'}];
const skillInfo={table:{name:'表格 Skill',desc:'结构化数据展示，适合精确对比',icon:'📊'},card:{name:'卡片 Skill',desc:'美观卡片布局，适合日常浏览',icon:'🃏'},chart:{name:'图表 Skill',desc:'可视化趋势展示，适合概览分析',icon:'📈'}};

function TableView8({data}) {
  return (
    <motion.div initial={{opacity:0,scale:0.95}} animate={{opacity:1,scale:1}} exit={{opacity:0,scale:0.95}} transition={{duration:0.3}}
      style={{border:'1px solid var(--border-active)',borderRadius:10,overflow:'hidden',boxShadow:'0 0 24px rgba(100,255,218,0.08)'}}>
      <div style={{display:'flex',background:'rgba(100,255,218,0.1)'}}>{['日期','天气','温度'].map(h=><div key={h} style={{padding:'10px 24px',fontSize:13,fontWeight:600,fontFamily:'var(--font-mono)',color:'var(--accent-primary)',borderRight:'1px solid var(--border-subtle)',flex:1,textAlign:'center'}}>{h}</div>)}</div>
      {data.map((row,i)=>(<div key={i} style={{display:'flex',borderTop:'1px solid var(--border-subtle)'}}>{[row.date,`${row.icon} ${row.weather}`,`${row.temp}°C`].map((cell,j)=>(<div key={j} style={{padding:'8px 24px',fontSize:13,fontFamily:'var(--font-mono)',color:'var(--text-secondary)',borderRight:j<2?'1px solid var(--border-subtle)':'none',flex:1,textAlign:'center'}}>{cell}</div>))}</div>))}
    </motion.div>
  );
}
function CardView8({data}) {
  return (
    <motion.div initial={{opacity:0,scale:0.95}} animate={{opacity:1,scale:1}} exit={{opacity:0,scale:0.95}} transition={{duration:0.3}}
      style={{display:'flex',gap:16,flexWrap:'wrap',justifyContent:'center'}}>
      {data.map((row,i)=>(<motion.div key={i} initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{delay:i*0.1}}
        style={{width:160,padding:'20px 16px',background:'linear-gradient(145deg,var(--bg-elevated),var(--bg-card))',border:'1px solid var(--border-subtle)',borderRadius:14,textAlign:'center',boxShadow:'0 4px 20px rgba(0,0,0,0.2)'}}
        whileHover={{y:-4,boxShadow:'0 8px 30px rgba(100,255,218,0.12)'}}>
        <div style={{fontSize:36,marginBottom:8}}>{row.icon}</div>
        <div style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-muted)',marginBottom:4}}>{row.date}</div>
        <div style={{fontFamily:'var(--font-sans)',fontSize:18,fontWeight:700,color:'var(--text-primary)',marginBottom:4}}>{row.weather}</div>
        <div style={{fontFamily:'var(--font-mono)',fontSize:16,fontWeight:600,color:'var(--accent-gold)'}}>{row.temp}°C</div>
      </motion.div>))}
    </motion.div>
  );
}
function ChartView8({data}) {
  const maxTemp=Math.max(...data.map(d=>d.temp));
  return (
    <motion.div initial={{opacity:0,scale:0.95}} animate={{opacity:1,scale:1}} exit={{opacity:0,scale:0.95}} transition={{duration:0.3}}
      style={{width:'100%',maxWidth:420,padding:'24px 20px',background:'var(--bg-elevated)',borderRadius:14,border:'1px solid var(--border-subtle)'}}>
      <p style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)',marginBottom:20,textAlign:'center'}}>未来 3 天温度趋势</p>
      <div style={{display:'flex',alignItems:'flex-end',justifyContent:'center',gap:28,height:140}}>
        {data.map((row,i)=>(<div key={i} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
          <span style={{fontFamily:'var(--font-mono)',fontSize:12,fontWeight:600,color:'var(--accent-gold)'}}>{row.temp}°C</span>
          <motion.div initial={{height:0}} animate={{height:`${(row.temp/maxTemp)*100}px`}} transition={{duration:0.6,delay:i*0.15,ease:'easeOut'}}
            style={{width:40,borderRadius:'6px 6px 0 0',background:'linear-gradient(to top,var(--accent-primary),var(--accent-secondary))',opacity:0.7+(row.temp/maxTemp)*0.3}}/>
          <div style={{textAlign:'center'}}><div style={{fontSize:16}}>{row.icon}</div><div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-muted)'}}>{row.date}</div></div>
        </div>))}
      </div>
    </motion.div>
  );
}

function Stage8() {
  const [mode,setMode]=useState('table');
  return (
    <SectionWrapper id="stage-8">
      <div style={{marginBottom:32}}>
        <StageBadge num={8}/>
        <h2 style={{fontFamily:'var(--font-sans)',fontSize:'clamp(24px,4vw,34px)',fontWeight:700,marginTop:20,marginBottom:12}}>Skill 技能系统</h2>
        <p style={{fontSize:18,color:'var(--accent-gold)',fontWeight:500,marginBottom:8}}>难度 ⭐⭐⭐⭐⭐⭐</p>
        <p style={{color:'var(--text-secondary)',lineHeight:1.8,maxWidth:680}}>用户想要的输出形式可能各不相同——表格、卡片、PPT、Word 文档……我们将不同的呈现能力封装为独立的 <strong style={{color:'var(--accent-primary)'}}>Skill（技能）</strong>，AI 在遇到呈现需求时可以自主匹配和运行最合适的 Skill。参考规范：<a href="https://agentskills.io/home" target="_blank" rel="noopener" style={{color:'var(--accent-secondary)',marginLeft:4}}>agentskills.io</a></p>
      </div>
      <motion.div style={{background:'var(--bg-card)',borderRadius:16,border:'1px solid var(--border-subtle)',padding:32}}
        initial={{opacity:0,y:30}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:0.6}}>
        <p style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--text-muted)',marginBottom:16,textAlign:'center'}}>任务：查未来 3 天天气，并以「美观的形式」呈现</p>
        <div style={{display:'flex',justifyContent:'center',gap:10,marginBottom:28,flexWrap:'wrap'}}>
          {Object.keys(skillInfo).map(key=>(<motion.button key={key} onClick={()=>setMode(key)}
            style={{padding:'10px 20px',fontSize:14,fontFamily:'var(--font-sans)',fontWeight:mode===key?600:400,background:mode===key?'rgba(100,255,218,0.1)':'transparent',border:`2px solid ${mode===key?'var(--accent-primary)':'var(--border-subtle)'}`,borderRadius:10,color:mode===key?'var(--accent-primary)':'var(--text-secondary)',cursor:'pointer',display:'flex',alignItems:'center',gap:6}}
            whileHover={{scale:1.04}} whileTap={{scale:0.97}}>
            <span>{skillInfo[key].icon}</span><span>{skillInfo[key].name}</span></motion.button>))}
        </div>
        <motion.div key={mode} initial={{opacity:0}} animate={{opacity:1}} style={{textAlign:'center',marginBottom:20}}>
          <p style={{fontSize:13,color:'var(--text-muted)'}}>{skillInfo[mode].desc}</p>
        </motion.div>
        <div style={{minHeight:200,display:'flex',justifyContent:'center',alignItems:'center'}}>
          <AnimatePresence mode="wait">
            {mode==='table'&&<TableView8 key="table" data={weatherData}/>}
            {mode==='card'&&<CardView8 key="card" data={weatherData}/>}
            {mode==='chart'&&<ChartView8 key="chart" data={weatherData}/>}
          </AnimatePresence>
        </div>
        <motion.div style={{marginTop:28,padding:'14px 20px',background:'rgba(100,255,218,0.04)',borderRadius:8,border:'1px solid var(--border-subtle)',fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)',textAlign:'center'}}
          initial={{opacity:0}} whileInView={{opacity:1}} viewport={{once:true}} transition={{delay:0.5}}>
          LLM 生成 skill call → apply_skill("weather_{mode}")  |  或通过 MCP / tool schema 调用对应 Skill
        </motion.div>
      </motion.div>
    </SectionWrapper>
  );
}

/* ========== STAGE: CONCLUSION ========== */
const threads=[{title:'提升理解能力',stages:'阶段 1 — 4',desc:'从预测字符到记住上下文，让模型学会「听懂」和「记住」',color:'var(--accent-primary)'},{title:'拓展行动边界',stages:'阶段 5 — 6',desc:'从纯文本对话到调用外部工具，让模型学会「做事」',color:'var(--accent-secondary)'},{title:'构建自主编排',stages:'阶段 7 — 8',desc:'从单步工具到多步工作流与技能匹配，让模型学会「规划」',color:'var(--accent-gold)'}];

function StageConclusion() {
  return (
    <SectionWrapper id="stage-conclusion">
      <motion.div style={{textAlign:'center'}} initial={{opacity:0}} whileInView={{opacity:1}} viewport={{once:true}}>
        <span style={{display:'inline-block',fontFamily:'var(--font-mono)',fontSize:12,color:'var(--accent-primary)',letterSpacing:3,textTransform:'uppercase',marginBottom:16,padding:'4px 14px',border:'1px solid var(--border-active)',borderRadius:20}}>结语</span>
        <h2 style={{fontFamily:'var(--font-sans)',fontSize:'clamp(22px,4vw,30px)',fontWeight:700,marginBottom:20,lineHeight:1.4}}>演进背后的三条主线</h2>
        <p style={{fontSize:16,color:'var(--text-secondary)',maxWidth:540,margin:'0 auto 36px',lineHeight:1.9}}>回顾这 8 个阶段，AI 模型的演进本质上是在做三件事。而这一切的起点，仅仅是「预测下一个字符」。</p>
        <div style={{display:'flex',gap:24,justifyContent:'center',flexWrap:'wrap',maxWidth:780,margin:'0 auto'}}>
          {threads.map((t,i)=>(<motion.div key={t.title} initial={{opacity:0,y:30}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:0.5,delay:i*0.15}}
            style={{flex:'1 1 220px',maxWidth:260,padding:'24px 20px',background:'var(--bg-card)',borderRadius:14,border:`1px solid ${t.color}33`,textAlign:'center'}}
            whileHover={{borderColor:t.color,boxShadow:`0 0 24px ${t.color}22`}}>
            <div style={{fontSize:28,marginBottom:12,color:t.color,fontFamily:'var(--font-mono)'}}>{i+1}</div>
            <h3 style={{fontFamily:'var(--font-sans)',fontSize:16,fontWeight:700,color:t.color,marginBottom:6}}>{t.title}</h3>
            <p style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)',marginBottom:8}}>{t.stages}</p>
            <p style={{fontSize:13,color:'var(--text-secondary)',lineHeight:1.7}}>{t.desc}</p>
          </motion.div>))}
        </div>
        <motion.p style={{marginTop:40,fontFamily:'var(--font-mono)',fontSize:14,color:'var(--accent-primary)',opacity:0.6}}
          initial={{opacity:0}} whileInView={{opacity:0.6}} viewport={{once:true}} transition={{delay:0.6}}>↓ 从预测下一个字符开始，到自主调度技能系统</motion.p>
      </motion.div>
    </SectionWrapper>
  );
}

/* ========== APP ========== */
function App() {
  const { activeId, scrollToStage, STAGE_IDS } = useActiveStage();
  const progress = useScrollProgress();

  return (
    <>
      <NavIndicator activeId={activeId} stageIds={STAGE_IDS} onNavigate={scrollToStage} progress={progress}/>
      <main>
        <StageCover/>
        <StageIntro/>
        <StageConnector label="从最基础的原理出发：语言模型的核心——预测下一个字符"/>
        <Stage1/>
        <StageConnector label="模型体积增大 + 训练数据规模扩张 → 涌现智能" secondary="从简单的统计预测到大规模神经网络的跃迁"/>
        <Stage2/>
        <StageConnector label="将 LLM 包装为对话接口，面向用户服务" secondary="模型不再只是实验室里的研究产物"/>
        <Stage3/>
        <StageConnector label="对话不能只做一次，需要持续的上下文交互"/>
        <Stage4/>
        <StageConnector label="换个角度使用对话：不只是聊天，而是处理真实任务"/>
        <Stage5/>
        <StageConnector label="突破 LLM 自身知识边界，接入外部工具能力" secondary="Function Calling + MCP 让模型与外部世界交互"/>
        <Stage6/>
        <StageConnector label="单次工具调用不稳定 → 需要编排多步骤工作流" secondary="引入子 Agent 和预设 Workflow 提升可靠性"/>
        <Stage7/>
        <StageConnector label="用户期望的输出形式多样化，需要灵活匹配" secondary="将不同的呈现能力封装为可复用的 Skill"/>
        <Stage8/>
        <StageConnector label="回顾全程：从预测到理解，从做事到规划"/>
        <StageConclusion/>
      </main>
      <div style={{height:'20vh'}}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
