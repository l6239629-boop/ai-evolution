const STAGE_IDS = ['stage-cover','stage-intro','stage-1','stage-2','stage-3','stage-4','stage-5','stage-6','stage-7','stage-8','stage-agent-types','stage-conclusion','stage-tips'];

function useActiveStage() {
  const [activeId, setActiveId] = useState('stage-cover');
  const handleScroll = useCallback(() => {
    const viewMiddle = window.innerHeight / 2;
    let closest = { id: activeId, dist: Infinity };
    for (const id of STAGE_IDS) {
      const el = document.getElementById(id);
      if (!el) continue;
      const rect = el.getBoundingClientRect();
      const dist = Math.abs(rect.top + rect.height / 2 - viewMiddle);
      if (dist < closest.dist) closest = { id, dist };
    }
    if (closest.id !== activeId) setActiveId(closest.id);
  }, [activeId]);
  useEffect(() => {
    window.addEventListener('scroll', handleScroll, { passive: true });
    handleScroll();
    return () => window.removeEventListener('scroll', handleScroll);
  }, [handleScroll]);
  const scrollToStage = useCallback((id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, []);
  return { activeId, scrollToStage, STAGE_IDS };
}

function useScrollProgress() {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const calc = () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      setProgress(docHeight > 0 ? scrollTop / docHeight : 0);
    };
    window.addEventListener('scroll', calc, { passive: true });
    calc();
    return () => window.removeEventListener('scroll', calc);
  }, []);
  return progress;
}

function useGlossaryNavigate(onClose) {
  return useCallback((stageId, subId) => {
    onClose();
    const targetId = subId || stageId;
    setTimeout(() => {
      const el = document.getElementById(targetId);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.style.transition = 'box-shadow 0.3s';
        el.style.boxShadow = '0 0 40px rgba(255,183,77,0.5)';
        setTimeout(() => { el.style.boxShadow = ''; }, 1500);
      }
    }, 350);
  }, [onClose]);
}

const GROUPED_GLOSSARY = (()=>{
  const stageOrder = ['stage-1','stage-2','stage-3','stage-4','stage-5','stage-6','stage-7','stage-8','stage-agent-types'];
  const groups = {};
  const stageNames = {'stage-1':'阶段 1 · 语言模型','stage-2':'阶段 2 · LLM 大语言模型','stage-3':'阶段 3 · 单次对话','stage-4':'阶段 4 · 多次对话','stage-5':'阶段 5 · 任务转向','stage-6':'阶段 6 · Agent 与工具','stage-7':'阶段 7 · Workflow','stage-8':'阶段 8 · Skill 系统','stage-agent-types':'阶段 8.5 · Agent 分化'};
  GLOSSARY.forEach(g => {
    if(!groups[g.stage]) groups[g.stage] = {name:stageNames[g.stage]||g.stage,items:[]};
    groups[g.stage].items.push(g);
  });
  return stageOrder.filter(s=>groups[s]).map(s=>groups[s]);
})();

    </motion.div>
  );
}

const DEMO_TEXTS = ['人工智能正在改变','今天天气真不错','语言模型可以预测'];

function predictNext(text) {
  if (!text) return [];
  const last = text[text.length-1];
  const map = {'变':['得','革','化','成','为'],'预':['测','报','料','订','防'],'错':['误','过','失','觉','位'],'天':['气','空','地','堂','才']};
  const candidates = map[last] || ['的','了','是','一','不','人','在','有','我','他'];
  const total = candidates.length;
  return candidates.map((c,i) => ({char:c,prob:(total-i)/(total*(total+1)/2)}));
}

const TOKEN_COLORS = ['#64ffda','#4fc3f7','#ffb74d','#f06292','#ba68c8','#4db6ac','#ff8a65','#aed581','#7986cb','#e57373','#81c784','#ffd54f','#4dd0e1','#b39ddb','#ffab91'];

function simpleTokenize(text) {
  if (/[\u4e00-\u9fff]/.test(text)) {
    const tokens=[];let i=0;
    while(i<text.length){const ch=text[i];
      if(/[\u4e00-\u9fff]/.test(ch)){if(i+1<text.length&&/[\u4e00-\u9fff]/.test(text[i+1])){tokens.push(text.slice(i,i+2));i+=2}else{tokens.push(ch);i++}}
      else if(/[a-zA-Z]/.test(ch)){let j=i;while(j<text.length&&/[a-zA-Z]/.test(text[j]))j++;tokens.push(text.slice(i,j));i=j}
      else if(ch===' '){tokens.push('␣');i++}else{if(ch==='?'||ch==='!'||ch==='.'||ch===','){tokens.push(ch);i++}else{tokens.push(ch);i++}}}
    return tokens;
  }
  return text.split(/(\s+|(?=[.,!?])|(?<=[.,!?]))/g).filter(Boolean).map(t=>t===' '?'␣':t);
}

function tokenize(text) {
  const tokens = [];
  let i = 0;
  while (i < text.length) {
    const ch = text[i];
    if (/[\u4e00-\u9fff]/.test(ch)) { tokens.push(text[i]); i++; }
    else if (/[a-zA-Z]/.test(ch)) { let j = i; while (j < text.length && /[a-zA-Z]/.test(text[j])) j++; tokens.push(text.slice(i, j)); i = j; }
    else if (/[0-9]/.test(ch)) { let j = i; while (j < text.length && /[0-9]/.test(text[j])) j++; tokens.push(text.slice(i, j)); i = j; }
    else if (ch === ' ') { tokens.push('␣'); i++; }
    else { tokens.push(text[i]); i++; }
  }
  return tokens;
}

function getTokenIds(tokens) {
  return tokens.map(t => { let h = 0; for (let i = 0; i < t.length; i++) { h = ((h << 5) - h) + t.charCodeAt(i); h |= 0; } return Math.abs(h % 90000) + 10000; });
}

function WfStep({id,label,tool,color,active,highlight}) {
  return (
    <motion.div style={{padding:'10px 18px',background:active?'var(--bg-elevated)':'var(--bg-deep)',border:`2px solid ${highlight?color:active?'var(--border-active)':'var(--border-subtle)'}`,borderRadius:10,textAlign:'center',minWidth:180,opacity:active?1:0.3,transition:'all 0.4s ease',boxShadow:highlight?`0 0 16px ${color}33`:'none'}}
      animate={highlight?{scale:[1,1.03,1]}:{}} transition={{duration:1.2,repeat:highlight?2:0}}>
      <div style={{fontFamily:'var(--font-mono)',fontSize:10,color,letterSpacing:1,marginBottom:4}}>Step {id}</div>
      <div style={{fontFamily:'var(--font-sans)',fontSize:13,fontWeight:600,color:'var(--text-primary)',marginBottom:3}}>{label}</div>
      <div style={{fontFamily:'var(--font-mono)',fontSize:10,color:'var(--text-muted)'}}>{tool}</div>
    </motion.div>
  );
}
