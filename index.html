const STAGE_IDS = ['stage-cover','stage-intro','stage-1','stage-2','stage-3','stage-4','stage-5','stage-6','stage-7','stage-8','stage-conclusion'];

function useActiveStage() {
  const [activeId, setActiveId] = useState('stage-cover');
  const handleScroll = useCallback(() => {
    const viewMiddle = window.innerHeight / 2;
    let closest = { id: activeId, dist: Infinity };
    for (const id of STAGE_IDS) {
      const el = document.getElementById(id);
      if (!el) continue;
      const rect = el.getBoundingClientRect();
      const dist = Math.abs(rect.top + rect.height / 2 - viewMiddle);
      if (dist < closest.dist) closest = { id, dist };
    }
    if (closest.id !== activeId) setActiveId(closest.id);
  }, [activeId]);
  useEffect(() => {
    window.addEventListener('scroll', handleScroll, { passive: true });
    handleScroll();
    return () => window.removeEventListener('scroll', handleScroll);
  }, [handleScroll]);
  const scrollToStage = useCallback((id) => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, []);
  return { activeId, scrollToStage, STAGE_IDS };
}

function useScrollProgress() {
  const [progress, setProgress] = useState(0);
  useEffect(() => {
    const calc = () => {
      const scrollTop = window.scrollY;
      const docHeight = document.documentElement.scrollHeight - window.innerHeight;
      setProgress(docHeight > 0 ? scrollTop / docHeight : 0);
    };
    window.addEventListener('scroll', calc, { passive: true });
    calc();
    return () => window.removeEventListener('scroll', calc);
  }, []);
  return progress;
}

/* ========== STAGE 1: LM ========== */
const DEMO_TEXTS = ['人工智能正在改变','今天天气真不错','语言模型可以预测'];

function predictNext(text) {
  if (!text) return [];
  const last = text[text.length-1];
  const map = {'变':['得','革','化','成','为'],'预':['测','报','料','订','防'],'错':['误','过','失','觉','位'],'天':['气','空','地','堂','才']};
  const candidates = map[last] || ['的','了','是','一','不','人','在','有','我','他'];
  const total = candidates.length;
  return candidates.map((c,i) => ({char:c,prob:(total-i)/(total*(total+1)/2)}));
}

function Stage1() {
  const [input,setInput] = useState('人工智能正在改变');
  const [predictions,setPredictions] = useState(predictNext('人工智能正在改变'));

  useEffect(() => { setPredictions(predictNext(input)); }, [input]);

      <motion.div style={{background:'var(--bg-card)',borderRadius:16,border:'1px solid var(--border-subtle)',padding:32,position:'relative',overflow:'hidden'}}
        initial={{opacity:0,y:30}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:0.6,delay:0.2}}>
        <div style={{marginBottom:24}}>
          <label style={{display:'block',fontSize:13,color:'var(--text-muted)',marginBottom:8,fontFamily:'var(--font-mono)'}}>输入一段文字：</label>
          <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
            <input value={input} onChange={e=>setInput(e.target.value)}
              style={{flex:1,minWidth:200,padding:'10px 16px',fontSize:16,fontFamily:'var(--font-mono)',background:'var(--bg-deep)',border:'1px solid var(--border-subtle)',borderRadius:8,color:'var(--text-primary)',outline:'none'}} placeholder="输入文字试试..."/>

          </div>
        </div>
        <div>
          <p style={{fontSize:13,color:'var(--text-muted)',marginBottom:12,fontFamily:'var(--font-mono)'}}>下一个字符的概率预测分布：</p>
          <div style={{display:'flex',flexDirection:'column',gap:8}}>
            {predictions.map((p,i) => (
              <motion.div key={p.char} style={{display:'flex',alignItems:'center',gap:12}}
                initial={{opacity:0,x:-20}} animate={{opacity:1,x:0}} transition={{duration:0.3,delay:i*0.05}}>

                    initial={{width:0}} animate={{width:`${p.prob*100}%`}} transition={{duration:0.6,delay:i*0.05,ease:'easeOut'}}/>

/* ========== STAGE 2: LLM + TOKENIZER ========== */
const SAMPLE_TEXTS = [{text:'我是一个人工智能助手',label:'中文示例'},{text:'Hello, how are you?',label:'英文示例'},{text:'What is the capital of China?',label:'问答示例'}];
const TOKEN_COLORS = ['#64ffda','#4fc3f7','#ffb74d','#f06292','#ba68c8','#4db6ac','#ff8a65','#aed581','#7986cb','#e57373','#81c784','#ffd54f','#4dd0e1','#b39ddb','#ffab91'];

function simpleTokenize(text) {
  if (/[\u4e00-\u9fff]/.test(text)) {
    const tokens=[];let i=0;
    while(i<text.length){const ch=text[i];
      if(/[\u4e00-\u9fff]/.test(ch)){if(i+1<text.length&&/[\u4e00-\u9fff]/.test(text[i+1])){tokens.push(text.slice(i,i+2));i+=2}else{tokens.push(ch);i++}}
      else if(/[a-zA-Z]/.test(ch)){let j=i;while(j<text.length&&/[a-zA-Z]/.test(text[j]))j++;tokens.push(text.slice(i,j));i=j}
      else if(ch===' '){tokens.push('␣');i++}else{if(ch==='?'||ch==='!'||ch==='.'||ch===','){tokens.push(ch);i++}else{tokens.push(ch);i++}}}
    return tokens;
  }
  return text.split(/(\s+|(?=[.,!?])|(?<=[.,!?]))/g).filter(Boolean).map(t=>t===' '?'␣':t);
}

function Stage2() {
  const [input,setInput]=useState(SAMPLE_TEXTS[0].text);

            style={{padding:'6px 14px',fontSize:12,fontFamily:'var(--font-mono)',background:input===s.text?'rgba(100,255,218,0.1)':'transparent',border:`1px solid ${input===s.text?'var(--border-active)':'var(--border-subtle)'}`,borderRadius:6,color:input===s.text?'var(--accent-primary)':'var(--text-secondary)',cursor:'pointer'}}>{s.label}</button>))}
        </div>
        <label style={{display:'block',fontSize:13,color:'var(--text-muted)',marginBottom:8,fontFamily:'var(--font-mono)'}}>Tokenizer 演示 — 输入文字查看切分结果：</label>

          style={{width:'100%',padding:'12px 16px',fontSize:16,fontFamily:'var(--font-mono)',background:'var(--bg-deep)',border:'1px solid var(--border-subtle)',borderRadius:8,color:'var(--text-primary)',outline:'none',marginBottom:20}}/>

        <StageConnector label="用户想让 LLM 处理需要实时数据的任务（天气、股价等）" secondary="但 LLM 的知识截止于训练数据"/>
        <Stage5/>
        <StageConnector label="突破 LLM 自身知识边界，接入外部工具能力" secondary="Function Calling + MCP 让模型与外部世界交互"/>
        <Stage6/>
        <StageConnector label="单次工具调用不稳定 → 需要编排多步骤工作流" secondary="引入子 Agent 和预设 Workflow 提升可靠性"/>
        <Stage7/>
        <StageConnector label="用户期望的输出形式多样化，需要灵活匹配" secondary="将不同的呈现能力封装为可复用的 Skill"/>
        <Stage8/>
        <StageConnector label="回顾全程：从预测到理解，从做事到规划"/>
        <StageConclusion/>
      </main>
      <div style={{height:'20vh'}}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
