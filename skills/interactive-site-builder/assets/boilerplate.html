<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>交互站点</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet"/>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/framer-motion@11/dist/framer-motion.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
:root {
  --bg-deep: #0a0e1a; --bg-card: #151d35; --bg-elevated: #1c2a4a;
  --text-primary: #e8ecf4; --text-secondary: #8892b0; --text-muted: #4a5578;
  --accent-primary: #64ffda; --accent-secondary: #4fc3f7; --accent-gold: #ffb74d;
  --border-subtle: rgba(100,255,218,0.08); --border-active: rgba(100,255,218,0.25);
  --glow-strong: 0 0 40px rgba(100,255,218,0.15); --glow-gold: 0 0 30px rgba(255,183,77,0.2);
  --font-mono: 'JetBrains Mono',monospace; --font-sans: 'Noto Sans SC',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--border-active) var(--bg-deep)}
body{font-family:var(--font-sans);background:var(--bg-deep);color:var(--text-primary);overflow-x:hidden;line-height:1.7}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg-deep)}
::-webkit-scrollbar-thumb{background:var(--border-active);border-radius:3px}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 0%,rgba(79,195,247,0.04) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 80% 40%,rgba(100,255,218,0.03) 0%,transparent 50%),radial-gradient(ellipse 50% 40% at 20% 70%,rgba(255,183,77,0.03) 0%,transparent 50%);pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(100,255,218,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(100,255,218,0.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none;z-index:0}
#root{position:relative;z-index:1}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback } = React;
const { motion, AnimatePresence } = Motion;

/* ========== HOOKS ========== */
const STAGE_IDS = ['stage-cover','stage-1','stage-2','stage-conclusion'];

function useActiveStage() {
  const [activeId, setActiveId] = useState('stage-cover');
  const handleScroll = useCallback(() => {
    const vm = window.innerHeight / 2;
    let best = { id: activeId, dist: Infinity };
    for (const id of STAGE_IDS) {
      const el = document.getElementById(id);
      if (!el) continue;
      const r = el.getBoundingClientRect();
      const d = Math.abs(r.top + r.height/2 - vm);
      if (d < best.dist) best = { id, dist: d };
    }
    if (best.id !== activeId) setActiveId(best.id);
  }, [activeId]);
  useEffect(() => {
    window.addEventListener('scroll', handleScroll, { passive: true });
    handleScroll();
    return () => window.removeEventListener('scroll', handleScroll);
  }, [handleScroll]);
  const scrollToStage = useCallback((id) => {
    document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, []);
  return { activeId, scrollToStage, STAGE_IDS };
}

function useScrollProgress() {
  const [p, setP] = useState(0);
  useEffect(() => {
    const calc = () => {
      const st = window.scrollY;
      const dh = document.documentElement.scrollHeight - window.innerHeight;
      setP(dh > 0 ? st / dh : 0);
    };
    window.addEventListener('scroll', calc, { passive: true });
    calc();
    return () => window.removeEventListener('scroll', calc);
  }, []);
  return p;
}

/* ========== COMPONENTS ========== */
const LABELS = { 'stage-cover':'封面','stage-1':'阶段1','stage-2':'阶段2','stage-conclusion':'结语' };

function NavIndicator({ activeId, stageIds, onNavigate, progress }) {
  return (
    <nav style={{position:'fixed',right:28,top:'50%',transform:'translateY(-50%)',zIndex:100,display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
      <div style={{position:'absolute',right:5,top:12,bottom:12,width:2,background:'var(--border-subtle)',borderRadius:1,overflow:'hidden'}}>
        <motion.div style={{width:'100%',background:'linear-gradient(to bottom,var(--accent-primary),var(--accent-gold))',borderRadius:1,transformOrigin:'top'}}
          animate={{height:`${progress*100}%`}} transition={{duration:0.1}}/>
      </div>
      {stageIds.map(id => {
        const active = id === activeId;
        return (
          <motion.button key={id} onClick={() => onNavigate(id)} title={LABELS[id]||id}
            style={{width:12,height:12,borderRadius:'50%',border:'none',cursor:'pointer',
              background:active?'var(--accent-primary)':'var(--text-muted)',
              boxShadow:active?'0 0 12px rgba(100,255,218,0.5)':'none',position:'relative',zIndex:1}}
            whileHover={{scale:1.4}} whileTap={{scale:0.9}}>
            {active && <motion.span layoutId="nl" style={{position:'absolute',right:22,top:'50%',transform:'translateY(-50%)',
              fontFamily:'var(--font-mono)',fontSize:10,color:'var(--accent-primary)',whiteSpace:'nowrap'}}>{LABELS[id]}</motion.span>}
          </motion.button>
        );
      })}
    </nav>
  );
}

function SectionWrapper({ id, children }) {
  return (
    <motion.section id={id} style={{minHeight:'90vh',display:'flex',flexDirection:'column',justifyContent:'center',padding:'60px 40px',maxWidth:960,margin:'0 auto',position:'relative'}}
      initial={{opacity:0,y:40}} whileInView={{opacity:1,y:0}} viewport={{once:true,margin:'-80px'}} transition={{duration:0.7}}>
      {children}
    </motion.section>
  );
}

function StageConnector({ label, secondary }) {
  return (
    <motion.div style={{display:'flex',flexDirection:'column',alignItems:'center',padding:'32px 0'}}
      initial={{opacity:0}} whileInView={{opacity:1}} viewport={{once:true,margin:'-100px'}} transition={{duration:0.6}}>
      <div style={{display:'flex',flexDirection:'column',alignItems:'center',marginBottom:12}}>
        <div style={{position:'relative',width:2,height:48}}>
          <motion.div style={{width:2,height:'100%',background:'linear-gradient(to bottom,var(--accent-primary),var(--accent-gold))',transformOrigin:'top'}}
            initial={{scaleY:0}} whileInView={{scaleY:1}} viewport={{once:true}} transition={{duration:0.8,delay:0.2}}/>
          <motion.div style={{position:'absolute',left:'50%',marginLeft:-4,width:8,height:8,borderRadius:'50%',background:'var(--accent-gold)',boxShadow:'0 0 12px rgba(255,183,77,0.6)'}}
            animate={{top:['0%','90%']}} transition={{duration:2,repeat:Infinity,ease:'easeInOut'}}/>
        </div>
        <motion.div style={{width:0,height:0,borderLeft:'7px solid transparent',borderRight:'7px solid transparent',borderTop:'8px solid var(--accent-gold)'}}
          initial={{opacity:0,y:-5}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:0.4,delay:0.8}}/>
      </div>
      <motion.div style={{fontFamily:'var(--font-sans)',fontSize:14,color:'var(--text-secondary)',textAlign:'center',maxWidth:420,lineHeight:1.6,whiteSpace:'nowrap',padding:'10px 20px',background:'var(--bg-card)',borderRadius:8,border:'1px solid var(--border-subtle)'}}
        initial={{opacity:0,y:10}} whileInView={{opacity:1,y:0}} viewport={{once:true}} transition={{duration:0.5,delay:0.3}}
        whileHover={{borderColor:'var(--border-active)',boxShadow:'var(--glow-gold)'}}>
        <span style={{color:'var(--accent-gold)',fontWeight:600}}>↓ </span>{label}
        {secondary && <span style={{display:'block',marginTop:4,fontSize:12,color:'var(--text-muted)'}}>{secondary}</span>}
      </motion.div>
    </motion.div>
  );
}

const StageBadge = ({ num }) => (
  <span style={{fontFamily:'var(--font-mono)',fontSize:12,color:'var(--accent-primary)',letterSpacing:3,textTransform:'uppercase',padding:'4px 14px',border:'1px solid var(--border-active)',borderRadius:20}}>
    阶段 {num}
  </span>
);

/* ========== STAGES ========== */
function StageCover() {
  return (
    <section id="stage-cover" style={{minHeight:'100vh',display:'flex',flexDirection:'column',justifyContent:'center',alignItems:'center',padding:'60px 40px',textAlign:'center',position:'relative'}}>
      <motion.div style={{position:'absolute',width:500,height:500,borderRadius:'50%',background:'radial-gradient(circle,rgba(100,255,218,0.06) 0%,transparent 70%)',top:'50%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none'}}
        animate={{scale:[1,1.15,1],opacity:[0.5,0.8,0.5]}} transition={{duration:6,repeat:Infinity,ease:'easeInOut'}}/>
      <motion.h1 style={{fontFamily:'var(--font-sans)',fontSize:'clamp(36px,6vw,64px)',fontWeight:900,lineHeight:1.2,marginBottom:24,background:'linear-gradient(135deg,var(--text-primary) 0%,var(--accent-primary) 50%,var(--accent-gold) 100%)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}
        initial={{opacity:0,y:30}} animate={{opacity:1,y:0}} transition={{duration:0.8,delay:0.4}}>
        站点标题
      </motion.h1>
      <motion.p style={{fontSize:18,color:'var(--text-secondary)',maxWidth:500,lineHeight:1.8,marginBottom:48}}
        initial={{opacity:0,y:20}} animate={{opacity:1,y:0}} transition={{duration:0.8,delay:0.6}}>
        副标题：一句话描述站点的核心叙事
      </motion.p>
      <motion.div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}
        initial={{opacity:0}} animate={{opacity:1}} transition={{duration:0.8,delay:1.2}}>
        <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--text-muted)',letterSpacing:2}}>向下滚动探索</span>
        <motion.div style={{width:24,height:40,borderRadius:12,border:'2px solid var(--border-active)',display:'flex',justifyContent:'center',paddingTop:8}}>
          <motion.div style={{width:4,height:8,borderRadius:2,background:'var(--accent-primary)'}}
            animate={{y:[0,8,0],opacity:[0.6,1,0.6]}} transition={{duration:1.5,repeat:Infinity,ease:'easeInOut'}}/>
        </motion.div>
      </motion.div>
    </section>
  );
}

function Stage1() {
  return (
    <SectionWrapper id="stage-1">
      <StageBadge num={1}/>
      <h2 style={{fontFamily:'var(--font-sans)',fontSize:'clamp(24px,4vw,34px)',fontWeight:700,marginTop:20,marginBottom:16}}>阶段 1 标题</h2>
      <p style={{color:'var(--text-secondary)',lineHeight:1.8,maxWidth:600}}>阶段 1 的内容描述。这里放入你的核心内容。</p>
    </SectionWrapper>
  );
}

function Stage2() {
  return (
    <SectionWrapper id="stage-2">
      <StageBadge num={2}/>
      <h2 style={{fontFamily:'var(--font-sans)',fontSize:'clamp(24px,4vw,34px)',fontWeight:700,marginTop:20,marginBottom:16}}>阶段 2 标题</h2>
      <p style={{color:'var(--text-secondary)',lineHeight:1.8,maxWidth:600}}>阶段 2 的内容描述。这里放入你的核心内容。</p>
    </SectionWrapper>
  );
}

function StageConclusion() {
  return (
    <SectionWrapper id="stage-conclusion">
      <motion.div style={{textAlign:'center'}} initial={{opacity:0}} whileInView={{opacity:1}} viewport={{once:true}}>
        <span style={{display:'inline-block',fontFamily:'var(--font-mono)',fontSize:12,color:'var(--accent-primary)',letterSpacing:3,textTransform:'uppercase',marginBottom:16,padding:'4px 14px',border:'1px solid var(--border-active)',borderRadius:20}}>结语</span>
        <h2 style={{fontFamily:'var(--font-sans)',fontSize:'clamp(22px,4vw,30px)',fontWeight:700,marginBottom:20}}>总结标题</h2>
        <p style={{fontSize:16,color:'var(--text-secondary)',maxWidth:540,margin:'0 auto',lineHeight:1.9}}>总结内容。</p>
      </motion.div>
    </SectionWrapper>
  );
}

/* ========== APP ========== */
function App() {
  const { activeId, scrollToStage, STAGE_IDS } = useActiveStage();
  const progress = useScrollProgress();

  return (
    <>
      <NavIndicator activeId={activeId} stageIds={STAGE_IDS} onNavigate={scrollToStage} progress={progress}/>
      <main>
        <StageCover/>
        <StageConnector label="从封面过渡到阶段 1，描述跃迁的关键原因"/>
        <Stage1/>
        <StageConnector label="从阶段 1 过渡到阶段 2，描述下一步的变化"/>
        <Stage2/>
        <StageConnector label="回顾全程：从起点到终点"/>
        <StageConclusion/>
      </main>
      <div style={{height:'20vh'}}/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
